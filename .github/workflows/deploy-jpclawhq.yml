name: Deploy To jpclawhq

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-jpclawhq
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'FRC1884/frc1884-scouting'
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.JPCLAWHQ_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.JPCLAWHQ_SSH_KEY }}
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_PRIVATE_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on jpclawhq
        env:
          SSH_HOST: ${{ secrets.JPCLAWHQ_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes mariano@"$SSH_HOST" \
            'cd /srv/frc1884-scouting && ./scripts/deploy-jpclawhq.sh'
