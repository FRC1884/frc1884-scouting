location = /scouting {
    return 301 /scouting/;
}

location ^~ /scouting/trpc-playground {
    rewrite ^/scouting(/trpc-playground.*)$ $1 break;
    proxy_pass http://127.0.0.1:3011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /scouting/trpc {
    rewrite ^/scouting(/trpc.*)$ $1 break;
    proxy_pass http://127.0.0.1:3011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /scouting/ {
    alias /srv/frc1884-scouting/apps/scanner/dist/;
    index index.html;
    try_files $uri $uri/ /scouting/index.html;
}
