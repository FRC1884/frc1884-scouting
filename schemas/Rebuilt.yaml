# yaml-language-server: $schema=https://raw.githubusercontent.com/omagarwal25/scouting-app/main/packages/game/schemas/game.schema.json
name: Rebuilt
description: 2026 FRC game
year: 2026
allianceSize: 3
elements:
  # defaults that should be there every year
  - name: scoutId
    label: Scout ID
    screens:
      - ObjectiveInfo
    field:
      fieldType: Dropdown
      options:
        - Red 1
        - Red 2
        - Red 3
        - Blue 1
        - Blue 2
        - Blue 3
  - name: matchType
    label: Match Type
    screens:
      - ObjectiveInfo
    field:
      fieldType: Dropdown
      options:
        - Practice
        - Qualification
        - Elimination
  - name: matchNumber
    label: Match Number
    screens:
      - ObjectiveInfo
    field:
      fieldType: Numeric
      isInteger: true
      incrementable: false
      min: 0
  - name: teamNumber
    label: Team Number
    screens:
      - ObjectiveInfo
      - PitInfo
    field:
      fieldType: Numeric
      isInteger: true
      incrementable: false
      min: 0
  - name: scoutNameOne
    label: Scout Name 1
    screens:
      - ObjectiveOther
      - PitOther
    field:
      fieldType: Text
  - name: scoutNameTwo
    label: Scout Name 2
    screens:
      - ObjectiveOther
      - PitOther
    field:
      fieldType: Text

  # pre-match info
  - name: startingPosition
    label: Starting Position
    screens:
      - ObjectivePregame
    field:
      fieldType: Dropdown
      options:
        - Not Present
        - Outpost / Human Player Side
        - Middle
        - Other Side
  
  # autonomous
  - name: shootingLocationAuto
    label: Shooting Location Auto
    screens:
      - ObjectiveAuto
    field:
      fieldType: Dropdown
      options:
        - N/A
        - Outpost / Human Player Side
        - Middle
        - Other Side
  - name: autoScored
    label: Auto Num Scored
    screens:
      - ObjectiveAuto
    field:
      fieldType: Numeric
      isInteger: true
      incrementable: true
  - name: autoMissed
    label: Auto Num Missed
    screens:
      - ObjectiveAuto
    field:
      fieldType: Numeric
      isInteger: true
      incrementable: true
  # need to add second auto cycle? 
  - name: autoClimb
    label: Auto Climb
    screens:
      - ObjectiveAuto
    field:
      fieldType: Dropdown
      options:
        - Not Attempted
        - Unsuccessful
        - Level 1

  # teleop info
  - name: shifts
    label: Shift
    screens:
      - ObjectiveTeleop
    field:
      fieldType: Grouping
      fields:
        - name: shiftActive
          label: Active Shift
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Boolean
        - name: shiftPickupLocation # change these to checkboxes
          label: Shift Pickup
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Dropdown
            options:
              - Alliance Zone
              - Neutral Zone
              - Opposing Alliance Zone
              - Outpost (Human Player Zone)
        - name: shiftShootingLocation # change these to checkboxes
          label: Shift Shooting Location
          screens:
            - ObjectiveTeleop
            - PitTeleop
          field:
            fieldType: Dropdown
            options:
              - Stationary (no turret)
              - Stationary (turret)
              - While moving
        - name: shiftNumScored
          label: Shift Num Scored
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Numeric
            isInteger: true
            incrementable: true
        - name: shiftNumMissed
          label: Shift Num Missed
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Numeric
            isInteger: true
            incrementable: true
        - name: shiftFerried # change these to checkboxes
          label: Shift Ferried
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Dropdown
            options:
              - Through air
              - Through trench
              - Over bump
        - name: shiftPlayedDefense
          label: Shift Played Defense
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Boolean
        - name: shiftWasDefended
          label: Shift Was Defended
          screens:
            - ObjectiveTeleop
          field:
            fieldType: Boolean

  # endgame
  - name: climb
    label: Climb
    screens:
      - ObjectiveEndgame
      - PitEndgame
    field:
      fieldType: Dropdown
      options:
        - Not attempted
        - Level 1
        - Level 2
        - Level 3
        - Failed Level 1

  # post game
  - name: defenseQuality
    label: Defense Quality
    screens:
      - ObjectivePostgame
    field:
      fieldType: Numeric
      isInteger: true
      incrementable: false
      max: 5
      min: 0
  - name: losingFuel
    label: Num fuel lost
    screens:
      - ObjectivePostgame
    field:
      fieldType: Numeric
      isInteger: true
      incrementable: true
  - name: trenchAbility
    label: Can go under trench?
    screens:
      - ObjectivePostgame
      - PitOther
    field:
      fieldType: Boolean
  - name: bumpAbility
    label: Can go over bump?
    screens:
      - ObjectivePostgame
      - PitOther
    field:
      fieldType: Boolean
  - name: disconnected
    label: disconnectedDuringMatch
    screens:
      - ObjectivePostgame
    field:
      fieldType: Boolean
  - name: notes
    label: notes
    screens:
      - ObjectivePostgame
      - PitOther
    field:
      fieldType: Text

  # pit info
  # pit generic info
  - name: drivetrain
    label: Drivetrain
    screens:
      - PitDrive
    field:
      fieldType: Dropdown
      options:
        - Swerve
        - Tank
        - Mecanum
        - Other
  - name: robotLength
    label: Robot Length
    screens:
      - PitSpecifications
    field:
      fieldType: Numeric
      isInteger: false
      incrementable: false
      min: 0
  - name: robotWidth
    label: Robot Width
    screens:
      - PitSpecifications
    field:
      fieldType: Numeric
      isInteger: false
      incrementable: false
      min: 0
  - name: robotWeight
    label: Robot Weight
    screens:
      - PitDrive
    field:
      fieldType: Numeric
      isInteger: false
      incrementable: false
      min: 0
  # pit unique info
  - name: hopperCapacity
    label: Hopper Capacity
    screens:
      - PitOther
    field:
      fieldType: Numeric
      isInteger: false
      incrementable: false
      min: 0
  # pit auto info
  - name: autoScore
    label: Auto Score
    screens:
      - PitAuto
    field:
      fieldType: Numeric
      isInteger: false
      incrementable: false
      min: 0
  - name: autoClimb
    label: Auto Climb
    screens:
      - PitAuto
    field:
      fieldType: Boolean
  # pit teleop info
  - name: shootWhileMoving
    label: Can they shoot while moving?
    screens:
      - PitTeleop
    field:
      fieldType: Boolean
  - name: photo
    label: Have you taken a photo of the robot?
    screens:
      - PitOther
    field:
      fieldType: Boolean
